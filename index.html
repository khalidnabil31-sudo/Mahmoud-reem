<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wedding Invitation | Reem & Mahmoud</title>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Alex+Brush&family=Cinzel:wght@400;600;700&family=Montserrat:wght@300;400;500&display=swap');

        :root {
            --bg-beige: #fbf9f4;
            --card-beige: rgba(251, 249, 244, 0.9);
            --text-brown: #4a3b32;
            --accent-gold: #c5a880;
            --font-serif: 'Cinzel', serif;
            --font-sans: 'Montserrat', sans-serif;
            --font-script: 'Alex Brush', cursive;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-beige);
            color: var(--text-brown);
            font-family: var(--font-sans);
            overflow: hidden;
            width: 100vw;
            height: 100vh;
        }

        /* خلفية الورد الكلاسيكية الداخلية خلف الكلام */
        .inner-floral-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('https://images.unsplash.com/photo-1526047932273-341f2a7631f9?q=80&w=1000&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            opacity: 0.12;
            pointer-events: none;
            z-index: 1;
        }

        /* تساقط أوراق الورد الهادئ في الخلفية */
        .rose-petals-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 2;
            overflow: hidden;
        }

        .petal {
            position: absolute;
            background: radial-gradient(circle, #fff0f5 20%, #ffb6c1 100%);
            border-radius: 150% 0% 150% 50%;
            opacity: 0.6;
            animation: petal-fall 8s linear infinite;
        }

        @keyframes petal-fall {
            0% { transform: translateY(-20px) rotate(0deg); opacity: 0; }
            10% { opacity: 0.7; }
            90% { opacity: 0.7; }
            100% { transform: translateY(105vh) rotate(360deg); opacity: 0; }
        }

        .invitation-container {
            position: relative;
            width: 100%;
            height: 100%;
        }

        /* بوابات الدعوة الكلاسيكية المغلقة */
        .gate-container {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: 100;
            display: flex;
            visibility: visible;
        }

        .gate {
            width: 50%;
            height: 100%;
            background-color: #f7f3eb;
            background-image: url('https://www.transparenttextures.com/patterns/cream-paper.png');
            transition: transform 1.8s cubic-bezier(0.77, 0, 0.175, 1);
            box-shadow: 0 0 40px rgba(0,0,0,0.12);
            position: relative;
        }

        .gate::before {
            content: '';
            position: absolute;
            top: 0;
            width: 120px;
            height: 100%;
            background-image: url('https://images.unsplash.com/photo-1526047932273-341f2a7631f9?q=80&w=300&auto=format&fit=crop');
            background-size: cover;
            opacity: 0.12;
        }

        .gate-left {
            border-right: 1px solid var(--accent-gold);
            transform-origin: left;
        }
        .gate-left::before { right: 0; }

        .gate-right {
            border-left: 1px solid var(--accent-gold);
            transform-origin: right;
        }
        .gate-right::before { left: 0; }

        /* منطقة الفيونكة والختم الشمعي المتمركزة بالمنتصف */
        .seal-bow-wrapper {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 110;
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            transition: all 1.5s cubic-bezier(0.77, 0, 0.175, 1);
        }

        /* الفيونكة الستان المرفوعة محلياً */
        .ribbon-bow {
            width: 250px;
            height: auto;
            filter: drop-shadow(0 10px 15px rgba(0,0,0,0.2));
            transition: transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 2; /* الطبقة تحت الختم الشمعي */
        }

        /* الختم الشمعي الأحمر المرفوع محلياً وفوق الفيونكة */
        .wax-seal {
            position: absolute;
            top: 40%; /* تم تعديل الموقع ليتناسب تماماً مع منتصف عقدة الفيونكة */
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80px;
            height: auto;
            z-index: 5; /* قيمة أكبر ليكون فوق الفيونكة تماماً */
            filter: drop-shadow(0 6px 10px rgba(0,0,0,0.35));
            transition: transform 0.5s ease;
        }

        .seal-bow-wrapper:hover .ribbon-bow {
            transform: scale(1.05);
        }
        .seal-bow-wrapper:hover .wax-seal {
            transform: translate(-50%, -50%) scale(1.1) rotate(8deg);
        }

        .click-text-hint {
            margin-top: 15px;
            font-family: var(--font-serif);
            font-size: 0.75rem;
            color: var(--text-brown);
            letter-spacing: 3px;
            text-transform: uppercase;
            background: rgba(251, 249, 244, 0.95);
            padding: 5px 16px;
            border-radius: 20px;
            border: 1px solid var(--accent-gold);
            font-weight: 600;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            z-index: 4;
        }

        /* حركات الفتح والتلاشي للبوابة والفيونكة */
        .opened .gate-left { transform: translateX(-100%); }
        .opened .gate-right { transform: translateX(100%); }
        
        .opened .seal-bow-wrapper { 
            opacity: 0; 
            pointer-events: none; 
            transform: translate(-50%, -50%) scale(1.3);
        }
        .opened .gate-container { visibility: hidden; transition-delay: 1.8s; }


        /* الشرايح والمحتوى الداخلي للموقع */
        .slide {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 2.5rem;
            text-align: center;
            opacity: 0;
            transform: translateY(30px);
            transition: transform 0.9s cubic-bezier(0.25, 1, 0.5, 1), opacity 0.9s;
            z-index: 10;
        }

        .slide.current { opacity: 1; transform: translateY(0); }
        .slide.past { opacity: 0; transform: translateY(-30px); }

        /* ستايلات الخطوط الفخمة والأنيقة */
        .countdown-title {
            font-family: var(--font-serif);
            font-size: 1.4rem;
            font-weight: 600;
            margin-bottom: 2.5rem;
            letter-spacing: 4px;
            text-transform: uppercase;
        }

        #countdown { display: flex; gap: 1.2rem; }

        #countdown div {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: var(--card-beige);
            padding: 1.5rem 1rem;
            border-radius: 8px;
            min-width: 75px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.03);
            border: 1px solid rgba(197, 168, 128, 0.4);
            backdrop-filter: blur(8px);
        }

        #countdown span { font-size: 2.2rem; font-weight: 300; }
        #countdown small { font-family: var(--font-serif); font-size: 0.7rem; letter-spacing: 1px; margin-top: 0.5rem; color: var(--accent-gold); text-transform: uppercase; }

        .verse { font-size: 1.7rem; line-height: 2.8rem; font-family: serif; font-weight: 500; max-width: 550px; }
        .bismillah { font-size: 1.5rem; margin-bottom: 1.5rem; color: var(--accent-gold); font-family: serif; }
        
        .sub-text-en { font-family: var(--font-serif); font-size: 0.85rem; text-transform: uppercase; letter-spacing: 4px; opacity: 0.8; }
        .parents-names { font-family: var(--font-serif); font-size: 1.4rem; font-weight: 400; line-height: 2.8rem; margin: 2rem 0; letter-spacing: 1px; }
        .invite-text-en { font-family: var(--font-sans); font-size: 0.95rem; font-weight: 300; letter-spacing: 0.5px; opacity: 0.9; }
